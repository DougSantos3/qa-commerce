<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA-Commerce - Home</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header id="header"></header>
    <div id="app">
      <br /><br />
      <h1>Sua Melhor Experiência de Compra Está Aqui!</h1>
      <p class="text-center">
        Navegue por nossa seleção de produtos e desfrute de uma experiência de compra única.
        <br />Atendimento personalizado, entrega rápida e fácil, e tudo o que você precisa em um só
        lugar. <br />Compre agora e viva o novo!
      </p>
      <div
        id="alert-container"
        class="alert d-none"
        style="position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 1050"
      ></div>

      <main class="container mt-5">
        <!-- Lista de Produtos -->
        <div id="product-list" class="row">
          <!-- Produtos serão listados dinamicamente aqui -->
        </div>
        <!-- Paginação -->
        <nav aria-label="Page navigation" class="mt-4">
          <ul class="pagination justify-content-center" id="pagination">
            <!-- Paginação dinâmica -->
          </ul>
        </nav>
      </main>
      <footer class="mt-5">
        <p class="text-center">&copy; 2024 QA-Commerce</p>
      </footer>
    </div>
    <script src="js/index.js"></script>
    <script src="js/header.js"></script>
  </body>
</html>
