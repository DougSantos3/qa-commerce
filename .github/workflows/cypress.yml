name: Cypress E2E Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against (dev, qa, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      browser:
        description: 'Select browser or cloud platform'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - edge
          - safari(webkit)
          - electron
          - browserstack

permissions:
  contents: write

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Install WebKit (if Safari)
        if: ${{ github.event.inputs.browser == 'safari(webkit)' }}
        run: |
          npx playwright install webkit
          sudo npx playwright install-deps webkit

      - name: Initialize Database and Start Local API Server
        if: ${{ github.event.inputs.environment == 'dev' }}
        run: |
          npm run db
          npm start & npx wait-on http://127.0.0.1:3000

      - name: Create Auth Fixture from Secret
        run: echo "$CYPRESS_AUTH" > cypress/fixtures/auth.json
        env:
          CYPRESS_AUTH: ${{ secrets.CYPRESS_AUTH }}

      - name: Run Cypress Tests (Standard)
        if: ${{ github.event.inputs.browser != 'browserstack' }}
        run: |
          if [ "$BROWSER_ARG" == "safari(webkit)" ]; then
            BROWSER_ARG="webkit"
          fi
          npm run "cy:run:$ENVIRONMENT" -- --browser "$BROWSER_ARG"
        env:
          BROWSER_ARG: ${{ github.event.inputs.browser }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          allure_results_dir: allure-results

      - name: Run Cypress Tests (BrowserStack)
        if: ${{ github.event.inputs.browser == 'browserstack' }}
        run: npm run browserstack:run
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          allure_results_dir: allure-results

      - name: Generate Allure Environment and Executor
        if: always()
        run: |
          mkdir -p allure-results
          cat <<EOF > allure-results/environment.properties
          Environment=${{ github.event.inputs.environment }}
          Browser=${{ github.event.inputs.browser }}
          CI=GitHub Actions
          Repository=${{ github.repository }}
          Run_Number=${{ github.run_number }}
          EOF

          cat <<EOF > allure-results/executor.json
          {
            "name": "GitHub Actions",
            "type": "github",
            "reportName": "QA Commerce E2E Report",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://dougsantos3.github.io/qa-commerce/${{ github.run_number }}/",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "buildName": "Cypress Run #${{ github.run_number }}",
            "buildOrder": "${{ github.run_number }}"
          }
          EOF

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@53ebb757a2097edc77c53ecef4d454fc2f2f774c
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: allure-report-${{ github.event.inputs.environment }}
          path: allure-report/
          retention-days: 10

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
