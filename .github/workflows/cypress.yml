name: Cypress E2E Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against (dev, qa, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      browser:
        description: 'Browser to run tests'
        required: true
        default: 'chrome'
        type: choice
        options:
          - electron
          - chrome
          - edge
          - firefox
          - safari(webkit)

permissions:
  contents: write

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Start Local API Server
        if: ${{ github.event.inputs.environment == 'dev' }}
        run: npm start & npx wait-on http://localhost:3000

      - name: Run Cypress Tests
        run: |
          BROWSER_ARG="${{ github.event.inputs.browser }}"
          if [ "$BROWSER_ARG" == "safari(webkit)" ]; then
            BROWSER_ARG="webkit"
          fi
          npm run cy:run:${{ github.event.inputs.environment }} -- --browser $BROWSER_ARG
        env:
          allure_results_dir: allure-results

      - name: Load old Allure Report history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Copy history to allure-results
        if: always()
        run: |
          mkdir -p allure-results/history
          cp -R gh-pages-dir/history/* allure-results/history/ || true

      - name: Generate Allure Environment and Executor
        if: always()
        run: |
          mkdir -p allure-results
          cat <<EOF > allure-results/environment.properties
          Environment=${{ github.event.inputs.environment }}
          Browser=${{ github.event.inputs.browser }}
          CI=GitHub Actions
          Repository=${{ github.repository }}
          Run_Number=${{ github.run_number }}
          EOF
          
          cat <<EOF > allure-results/executor.json
          {
            "name": "GitHub Actions",
            "type": "github",
            "reportName": "QA Commerce E2E Report",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://dougsantos3.github.io/qa-commerce/",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "buildName": "Cypress Run #${{ github.run_number }}",
            "buildOrder": "${{ github.run_number }}"
          }
          EOF

      - name: Generate Allure Report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-${{ github.event.inputs.environment }}
          path: allure-report/
          retention-days: 10

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
